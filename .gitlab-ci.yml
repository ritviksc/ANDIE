default:
  tags:
    - docker

image:
  name: gradle:9-jdk25-alpine
  pull_policy: if-not-present

before_script:
  - set +o pipefail # stop pipes from failing entire pipeline
  - |
    cat <<EOF > gradle.properties
    systemProp.http.proxyHost=rtis-proxy-r01.uod.otago.ac.nz
    systemProp.http.proxyPort=3128
    systemProp.http.nonProxyHosts=altitude.otago.ac.nz|docker|172.17.0.*
    systemProp.https.proxyHost=rtis-proxy-r01.uod.otago.ac.nz
    systemProp.https.proxyPort=3128
    systemProp.https.nonProxyHosts=altitude.otago.ac.nz|docker|172.17.0.* 
    EOF

javadoc:
  stage: build
  script:
    - echo 'Attempting to generate JavaDoc documentation...'
    - gradle -Dorg.gradle.welcome=never javadoc
    - echo 'Done.'
  artifacts:
    paths:
      - build/docs


pages:
  stage: deploy
  script:

    - set +o pipefail
    
    - echo "Preparing pages..."
    - mkdir -p public/javadoc
    - mkdir -p public/docs

    - cp -r build/docs/javadoc/* public/javadoc/
    - cp build/libs/andie-1.0.0.jar public/
    - cp -r docs/* public/docs/ || true

    - ls -R public | head

  artifacts:
    paths:
      - public
  only:
    - main




unit-test-job:
  script:
  - echo "Attempting to run unit tests..."
  - gradle test